# Build settings
[build]
  publish = "dist"
  command = "npm run build"

# ==================================================================
# Prerender.io Integration for SEO
# ==================================================================
# Bot User-Agents that should receive pre-rendered pages
# These redirects send crawler requests to Prerender.io service
# 
# SETUP STEPS:
# 1. Sign up at https://prerender.io (free plan: 250 pages/month)
# 2. Get your Prerender Token from dashboard
# 3. Replace YOUR_PRERENDER_TOKEN below with your actual token
# ==================================================================

# Googlebot
[[redirects]]
  from = "/*"
  to = "https://service.prerender.io/https://tarkhisun.com/:splat"
  status = 200
  force = true
  conditions = {User-Agent = [".*Googlebot.*"]}
  headers = {X-Prerender-Token = "YOUR_PRERENDER_TOKEN"}

